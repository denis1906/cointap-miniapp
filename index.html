<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CoinTap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Вкладка 1: Кликер -->
  <div id="tab-clicker" class="tab active">
    <div id="coins-display">
      <span id="coins-value">0</span>
      <span class="coins-label">монет</span>
    </div>
    <div id="cpc-display">+<span id="cpc-value">1</span> за клик</div>

    <div id="coin-wrapper">
      <canvas id="particles-canvas"></canvas>
      <button id="coin-btn" aria-label="Нажать монету"></button>
    </div>

    <div id="passive-display" style="display:none">
      ⚡ +<span id="passive-value">0</span>/сек
    </div>
  </div>

  <!-- Вкладка 2: Магазин -->
  <div id="tab-shop" class="tab">
    <h2>Магазин улучшений</h2>
    <div id="shop-list"></div>
  </div>

  <!-- Вкладка 3: Лидеры -->
  <div id="tab-leaders" class="tab">
    <h2>Таблица лидеров</h2>
    <ol id="leaders-list"></ol>
  </div>

  <!-- Навигация -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="clicker">🪙 Кликер</button>
    <button class="nav-btn"        data-tab="shop">🛒 Магазин</button>
    <button class="nav-btn"        data-tab="leaders">🏆 Лидеры</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
